name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ------ 1. LINT ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Check style and imports
        run: ruff check backend/app --select E,W,F,I --output-format=github

  # ------ 2. TEST ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
  test:
    name: Test (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest-cov
      - name: Run tests with coverage gate (70%)
        run: |
          cd backend
          pytest tests/ -p no:cacheprovider --tb=short -q \
            --cov=app --cov-report=term-missing --cov-fail-under=70

  # ------ 3. BUILD (validates Dockerfile on every PR, no push) ---------------------------------------
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: fintech-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: fintech-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max